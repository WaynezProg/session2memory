interface:
  display_name: "Session2Memory"
  short_description: "Compile local coding sessions into HKS-ready memory"
  default_prompt: "Use $session2memory to import into $HKS_SESSION2MEMORY_EXPORT_ROOT/<workspace_id>, review candidates, then call hks_workspace_ingest_session_memory(workspace_id, path=daily/YYYY-MM-DD.md) via HKS agent profile MCP. Do not ks-ingest raw session stores."
policy:
  allow_implicit_invocation: true
